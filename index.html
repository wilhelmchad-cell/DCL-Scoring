
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>DCL Team Tracker</title>
<style>
:root{--orange:#ff8c00;--black:#111111;--dark:#1b1b1b;--card:rgba(255,255,255,.06);--line:rgba(255,255,255,.12)}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,var(--black),var(--dark));color:#fff}
.app{max-width:1200px;margin:0 auto;padding:14px} .title{color:var(--orange);font-size:2rem;font-weight:900;text-align:center} .sub{text-align:center;opacity:.9;margin-top:4px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0} .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px} .btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;margin:10px 0 6px;font-weight:700} input,select,button{width:100%;border:0;border-radius:12px;padding:14px;font-size:16px}
input,select{background:#fff;color:#000} button{background:var(--orange);color:#000;font-weight:900}
.smallbtn{background:#2a2a2a;color:#fff;border:1px solid var(--line)} .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#2a2a2a;margin:4px 6px 0 0;font-size:13px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px} .tab{background:#2a2a2a;color:#fff;border:1px solid var(--line);padding:12px;border-radius:12px;font-weight:800} .tab.active{background:var(--orange);color:#000}
.panel{display:none} .panel.active{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:rgba(255,255,255,.08);padding:12px;border-radius:14px;text-align:center}
.list{width:100%;border-collapse:collapse}.list th,.list td{border-bottom:1px solid rgba(255,255,255,.1);padding:10px 6px;text-align:left;font-size:14px;vertical-align:top}
.scorewrap{display:grid;grid-template-columns:1fr 260px 1fr;gap:12px;align-items:stretch}.scoreteam{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:16px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:240px}.logo{width:72px;height:72px;border-radius:18px;margin:0 auto 10px;background:linear-gradient(135deg,var(--orange),#ffd08a);display:grid;place-items:center;color:#111;font-size:34px;font-weight:900}.scorename{font-size:1.1rem;font-weight:800;text-align:center;opacity:.95}.score{font-size:84px;font-weight:900;text-align:center;line-height:1;margin:18px 0 6px;color:#fff}.centerpanel{display:flex;flex-direction:column;gap:10px;justify-content:center}.centerpanel .card{margin:0}.scorepad{display:grid;grid-template-columns:1fr 1fr;gap:8px}.scorepad button{height:64px;font-size:22px}.green{background:#3cb371}.red{background:#d9534f}.mid{background:#f5f5f5;color:#000}.ghost{background:#2a2a2a;color:#fff;border:1px solid var(--line)}.bigaction{height:58px;font-size:18px}.hidden{display:none}.fullscreen{position:fixed;inset:0;background:linear-gradient(180deg,#0f0f0f,#1b1b1b);z-index:9999;padding:16px;display:none;overflow:auto}.fullscreen.show{display:block}.fs-top{display:flex;justify-content:space-between;align-items:center;gap:10px}.fs-logo{width:110px;height:110px;border-radius:26px;background:linear-gradient(135deg,var(--orange),#ffd08a);display:grid;place-items:center;color:#111;font-size:56px;font-weight:900;margin:18px auto 8px}.fs-team{font-size:1.6rem;font-weight:900;text-align:center}.fs-score{font-size:120px;font-weight:900;text-align:center;line-height:1;margin:18px 0}.fs-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}.fs-controls button{height:72px;font-size:26px}.fs-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.fs-bar button{height:56px;font-size:16px}.timer{font-size:1.5rem;font-weight:900;text-align:center;color:#fff;margin-top:10px}.pulse{animation:pulse 1.1s infinite}@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@media(max-width:980px){.scorewrap{grid-template-columns:1fr}.centerpanel{order:3}.scoreteam{min-height:auto}.tabs{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.row,.three,.stats{grid-template-columns:1fr}.app{padding:10px}.title{font-size:1.7rem}.score{font-size:72px}}
</style>
</head>
<body>
<div class="app">
  <div class="title">🏆 DCL Team Tracker</div>
  <div class="sub">Scoreboard-style scoring with full-screen match mode</div>
  <div class="card tabs">
    <button class="tab active" data-tab="match">Match Log</button>
    <button class="tab" data-tab="score">Scoreboard</button>
    <button class="tab" data-tab="stats">Stats</button>
    <button class="tab" data-tab="history">History</button>
  </div>

  <div id="match" class="panel active">
    <div class="card">
      <h2 style="margin-top:0">Add Match</h2>
      <div class="row">
        <div><label>Team 1 player 1</label><input id="t1p1"></div>
        <div><label>Team 1 player 2</label><input id="t1p2"></div>
      </div>
      <div class="row">
        <div><label>Team 2 player 1</label><input id="t2p1"></div>
        <div><label>Team 2 player 2</label><input id="t2p2"></div>
      </div>
      <div class="row">
        <div><label>Game type</label><select id="gameType"><option>League</option><option>Run to 21</option><option>Driveway rules</option><option>Cut Throat</option><option>chairhole</option><option>Singles</option></select></div>
        <div><label>Winner</label><select id="winner"><option value="team1">Team 1</option><option value="team2">Team 2</option></select></div>
      </div>
      <div style="margin-top:12px"><button id="saveMatch">Save Match</button></div>
    </div>
  </div>

  <div id="score" class="panel
